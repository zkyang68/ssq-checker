name: Update SSQ Data

on:
  schedule:
    # 每周二、四、日晚 22:00 北京时间 (UTC+8) = 14:00 UTC
    - cron: '0 14 * * 2,4,0'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'scripts/update-data.js'
      - '.github/workflows/update-data.yml'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch & update draws
        run: node scripts/update-data.js
      - name: Commit if changed
        run: |
          if git diff --quiet data/draws.json; then
            echo "No changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/draws.json
            git commit -m "chore: update ssq draws [skip ci]"
            git push
          fi
